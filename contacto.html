<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portafolio | Contacto</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <style>body { font-family: 'Inter', sans-serif; }</style>
</head>
<body class="bg-slate-50">
    <header class="bg-white shadow-sm">
        <nav class="container mx-auto px-6 py-4 flex justify-between items-center">
            <span class="text-xl font-bold text-indigo-600">DevFicticio</span>
            <ul class="flex gap-6">
                <li><a href="index.html" class="hover:text-indigo-600 transition">Inicio</a></li>
                <li><a href="proyectos.html" class="hover:text-indigo-600 transition">Proyectos</a></li>
                <li><a href="contacto.html" class="text-indigo-600">Contacto</a></li>
            </ul>
        </nav>
    </header>

    <main class="container mx-auto px-6 py-12 max-w-2xl">
        <h2 class="text-3xl font-bold text-center mb-8">Hablemos</h2>
        <form action="https://formspree.io/f/tu_id_aqui" method="POST" class="bg-white p-8 rounded-2xl shadow-lg space-y-4">
            <div>
                <label class="block mb-2 text-sm font-medium">Nombre</label>
                <input type="text" name="name" required class="w-full p-3 border border-slate-200 rounded-lg outline-none focus:ring-2 focus:ring-indigo-500">
            </div>
            <div>
                <label class="block mb-2 text-sm font-medium">Email</label>
                <input type="email" name="email" required class="w-full p-3 border border-slate-200 rounded-lg outline-none focus:ring-2 focus:ring-indigo-500">
            </div>
            <div>
                <label class="block mb-2 text-sm font-medium">Mensaje</label>
                <textarea name="message" rows="4" required class="w-full p-3 border border-slate-200 rounded-lg outline-none focus:ring-2 focus:ring-indigo-500"></textarea>
            </div>
            <button type="submit" class="w-full bg-indigo-600 text-white font-bold py-3 rounded-lg hover:bg-indigo-700 transition">Enviar Mensaje</button>
        </form>

        <footer class="mt-12 text-center border-t py-8">
            <p class="mb-4 text-slate-500">Mis redes sociales:</p>
            <div class="flex justify-center gap-6">
                <a href="https://linkedin.com/in/mateo-robledo" target="_blank" class="text-slate-400 hover:text-indigo-600 text-sm">LinkedIn</a>
                <a href="https://github.com/m-robledo"target="_blank" class="text-slate-400 hover:text-indigo-600 text-sm">GitHub</a>
                <a href="https://twitter.com" target="_blank" class="text-slate-400 hover:text-indigo-600 text-sm">Twitter</a>
            </div>
        </footer>
    </main>
</body>
</html>
